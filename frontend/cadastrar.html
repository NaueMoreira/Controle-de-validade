<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Cadastrar Produto</title>
  </head>

  <body>
    <div class="header">
      <img
        src="images/logo-farmaceuticos.png"
        alt="Logo Farmacêuticos"
        class="logo"
      />

      <h2>Cadastrar Produto Próximo ao Vencimento</h2>

      <img
        src="images/logo-farmaceuticos.png"
        alt="Logo Farmacêuticos"
        class="logo"
      />
    </div>

    <div id="box-cadastro">
      <div id="box-cadastro-interno">
        <input type="hidden" id="produtoId">
        <form id="form">
          <input id="codigoInterno" placeholder="Código interno" />
          <br /><br />

          <input id="codigoBarras" placeholder="Código de barras" />
          <br /><br />

          <input id="nome" placeholder="Nome" required />
          <br /><br />

          <input type="date" id="validade" required />
          <br /><br />

          <input
            type="number"
            id="quantidade"
            placeholder="Quantidade"
            required
          />
          <br /><br />

          <select id="tipo">
            <option value="Medicamento">Medicamento</option>
            <option value="Alimento">Alimento</option>
            <option value="Perfumaria">Perfumaria</option>
          </select>
          <br /><br />

          <select id="sessao">
            <option value="Referencia">Referência</option>
            <option value="Genérico">Genérico</option>
            <option value="Similar">Similar</option>
            <option value="Perfumaria">Perfumaria</option>
            <option value="Alimenticios">Alimentícios</option>
            <option value="MIP">MIP - Medicamentos isentos de prescrição</option>
          </select>
          <br /><br />

          <button id="btn-cadastrar" type="submit">Cadastrar</button>
        </form>
      </div>
    </div>

    <script>
      const REMOTE_API = "https://controle-de-validade-b1kj.onrender.com";
      const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
        ? 'http://localhost:3000'
        : REMOTE_API;

    async function buscarProdutoPorCodigo(codigo) {

  if (!codigo) return;

  try {

    const resposta = await fetch(
      `${API}/produtos/buscar/${codigo}`
    );

    if (!resposta.ok) {
      return;
    }

    const produto = await resposta.json();

    document.getElementById("produtoId").value =
      produto._id;

    document.getElementById("nome").value =
      produto.nome || "";

    document.getElementById("tipo").value =
      produto.tipo || "Medicamento";

  } catch (erro) {
    console.log(erro);
  }
}

      document.getElementById("codigoInterno").addEventListener("blur", () => {
        buscarProdutoPorCodigo(
          document.getElementById("codigoInterno").value
        );
      });

      document.getElementById("codigoBarras").addEventListener("blur", () => {
        buscarProdutoPorCodigo(
          document.getElementById("codigoBarras").value
        );
      });

      document.getElementById("form").addEventListener("submit", async (e) => {
        e.preventDefault();

        try {
          const tipo = document.getElementById("tipo").value;

          const resposta = await fetch(`${API}/produtos`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              codigoInterno: document.getElementById("codigoInterno").value,
              codigoBarras: document.getElementById("codigoBarras").value,
              nome: document.getElementById("nome").value,
              validade: document.getElementById("validade").value,
              quantidade: Number(document.getElementById("quantidade").value),
              sessao: document.getElementById("sessao").value,
              tipo: tipo,
              alertaDias: tipo === "Medicamento" ? 60 : 30,
            }),
          });

          if (!resposta.ok) {
            throw new Error("Erro ao cadastrar produto");
          }

          window.location.href = "listar.html";
        } catch (erro) {
          alert("Erro ao cadastrar. Veja o console.");
          console.error(erro);
        }
      });
    </script>
  </body>
</html>
